<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <!-- 毛玻璃背景滤镜 -->
    <filter id="glass-blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" />
    </filter>
    <filter id="soft-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#F59E0B" flood-opacity="0.3"/>
    </filter>
    <!-- 柠檬主体渐变 -->
    <linearGradient id="lemon-body" x1="0.2" y1="0" x2="0.8" y2="1">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="50%" stop-color="#FACC15"/>
      <stop offset="100%" stop-color="#EAB308"/>
    </linearGradient>
    <!-- 毛玻璃高光渐变 -->
    <linearGradient id="glass-highlight" x1="0.3" y1="0" x2="0.7" y2="0.6">
      <stop offset="0%" stop-color="white" stop-opacity="0.65"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- 叶子渐变 -->
    <linearGradient id="leaf-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <!-- 叶子高光 -->
    <linearGradient id="leaf-highlight" x1="0.2" y1="0" x2="0.8" y2="0.5">
      <stop offset="0%" stop-color="white" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- 背景光晕 -->
    <radialGradient id="glow" cx="0.5" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#FDE047" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#FDE047" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- 背景光晕 -->
  <circle cx="256" cy="270" r="200" fill="url(#glow)"/>

  <!-- 柠檬主体 - 圆润的椭圆柠檬形状 -->
  <g filter="url(#soft-shadow)">
    <ellipse cx="256" cy="290" rx="140" ry="155" fill="url(#lemon-body)" transform="rotate(-15, 256, 290)"/>
  </g>

  <!-- 柠檬顶部凸起 -->
  <ellipse cx="210" cy="165" rx="30" ry="45" fill="#FACC15" transform="rotate(-25, 210, 165)"/>

  <!-- 柠檬底部凸起 -->
  <ellipse cx="310" cy="410" rx="25" ry="38" fill="#EAB308" transform="rotate(-15, 310, 410)"/>

  <!-- 毛玻璃高光层 - 核心效果 -->
  <ellipse cx="230" cy="250" rx="95" ry="110" fill="url(#glass-highlight)" transform="rotate(-15, 230, 250)"/>

  <!-- 二次高光 - 增强玻璃质感 -->
  <ellipse cx="220" cy="230" rx="50" ry="65" fill="white" fill-opacity="0.2" transform="rotate(-20, 220, 230)"/>

  <!-- 小高光点 -->
  <circle cx="205" cy="215" r="12" fill="white" fill-opacity="0.5"/>
  <circle cx="220" cy="235" r="6" fill="white" fill-opacity="0.35"/>

  <!-- 叶子茎 -->
  <path d="M240 170 Q255 130 248 105" stroke="#16A34A" stroke-width="6" stroke-linecap="round" fill="none"/>

  <!-- 左叶子 -->
  <path d="M248 110 Q200 70 185 95 Q170 120 228 125 Z" fill="url(#leaf-grad)"/>
  <path d="M248 110 Q210 80 198 100 Q190 112 230 118 Z" fill="url(#leaf-highlight)"/>

  <!-- 右叶子 -->
  <path d="M248 105 Q295 55 310 82 Q325 108 255 118 Z" fill="url(#leaf-grad)"/>
  <path d="M250 108 Q288 68 300 88 Q308 100 260 112 Z" fill="url(#leaf-highlight)"/>

  <!-- 叶脉 -->
  <path d="M248 112 Q220 98 195 100" stroke="white" stroke-width="1.5" stroke-opacity="0.3" fill="none"/>
  <path d="M250 110 Q280 90 305 88" stroke="white" stroke-width="1.5" stroke-opacity="0.3" fill="none"/>
</svg>
